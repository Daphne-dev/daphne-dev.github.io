</head><body class="is-1-column"><nav class="navbar navbar-main"><div class="container"><div class="navbar-brand justify-content-center"><a class="navbar-item navbar-logo" href="/">Daphne&#039;s blog</a></div><div class="navbar-menu"><div class="navbar-end"></div></div></div></nav><section class="section"><div class="container"><div class="columns"><div class="column order-2 column-main is-12"><div class="card"><div class="card-content"><nav class="breadcrumb" aria-label="breadcrumbs"><ul><li><a href="/tags">태그</a></li><li class="is-active"><a href="#" aria-current="page">페르마의 소정리</a></li></ul></nav></div></div><div class="card"><article class="card-content article" role="article"><div class="article-meta is-size-7 is-uppercase level is-mobile"><div class="level-left"><span class="level-item"><time dateTime="2020-08-22T09:02:53.000Z" title="2020. 8. 22. 오후 6:02:53">2020-08-22</time>&nbsp;게시 됨</span><span class="level-item"><time dateTime="2020-08-22T09:04:50.224Z" title="2020. 8. 22. 오후 6:04:50">2020-08-22</time>&nbsp;업데이트 됨</span><span class="level-item"><a class="link-muted" href="/categories/%EC%95%8C%EA%B3%A0%EB%A6%AC%EC%A6%98-SQL/">알고리즘 &amp; SQL</a><span> / </span><a class="link-muted" href="/categories/%EC%95%8C%EA%B3%A0%EB%A6%AC%EC%A6%98-SQL/%EB%B9%84%ED%83%80%EC%95%8C%EA%B3%A0/">비타알고</a></span></div></div><h1 class="title is-3 is-size-4-mobile"><a class="link-muted" href="/2020/08/22/bitaalgo-010/">[비타알고] 세포분열(★3)</a></h1><div class="content"><p>*이 글은 구름edu의 위클리 비타알고 시즌2 코딩테스트 대비 입문편을 기반으로 쓰여진 글입니다.<br>출처 : <a target="_blank" rel="noopener" href="https://edu.goorm.io/learn/lecture/15551/%EC%9C%84%ED%81%B4%EB%A6%AC-%EB%B9%84%ED%83%80%EC%95%8C%EA%B3%A0-%EC%8B%9C%EC%A6%8C2-%EC%BD%94%EB%94%A9%ED%85%8C%EC%8A%A4%ED%8A%B8-%EB%8C%80%EB%B9%84-%EC%9E%85%EB%AC%B8%ED%8E%B8">위클리 비타알고 시즌2 코딩테스트 대비 입문편</a></p>
<h3 id="문제"><a href="#문제" class="headerlink" title="문제"></a>문제</h3><p><img src="/image/bita_010.PNG" alt=""><br><img src="/image/bita_010-1.PNG" alt=""></p>
<h3 id="소스코드"><a href="#소스코드" class="headerlink" title="소스코드"></a>소스코드</h3><figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br></pre></td><td class="code"><pre><span class="line">N, K, T = map(int, input().split())</span><br><span class="line">mod = <span class="number">1000000007</span></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">pow</span><span class="params">(a, n)</span>:</span></span><br><span class="line">    <span class="keyword">global</span> mod</span><br><span class="line">    res = <span class="number">1</span></span><br><span class="line">    <span class="keyword">while</span> n:</span><br><span class="line">        <span class="keyword">if</span> n % <span class="number">2</span>:</span><br><span class="line">            res *=a</span><br><span class="line">            res %= mod</span><br><span class="line">        a *= a</span><br><span class="line">        a %= mod</span><br><span class="line">        <span class="comment"># 큰 값끼리의 연산에서는 몫을 구할 때 주의 / 연산자 대신 // 연산자를 써야된다.</span></span><br><span class="line">        <span class="comment"># / 연산자를 쓰면 부동 소수점 오차 문제 때문에 변환과정에서 오차가 생긴다. </span></span><br><span class="line">        n //= <span class="number">2</span></span><br><span class="line">    <span class="keyword">return</span> res</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">solve</span><span class="params">(n, k, t)</span>:</span></span><br><span class="line">    <span class="comment"># 해당 문제를 토대로 등비수열의 합을 식으로 나타내면</span></span><br><span class="line">    <span class="comment"># N(K^T -1)/(K-1) 이다.</span></span><br><span class="line">    <span class="comment"># 이를 1000000007 로 나눈 나머지를 구해야 한다.</span></span><br><span class="line">    <span class="comment"># mod = 1000000007</span></span><br><span class="line">    <span class="comment"># 나머지 연산자의 성질</span></span><br><span class="line">    <span class="comment"># (a-b)%c = ((a%c)-(b%c)+c)%c</span></span><br><span class="line">    <span class="comment"># 페르마의 소정리를 이용</span></span><br><span class="line">    <span class="comment"># N(K^T -1)/(K-1) % mod</span></span><br><span class="line">    <span class="comment"># N(K^T -1)(K-1)^-1 % mod</span></span><br><span class="line">    <span class="comment"># (((N(K^T -1)) % mod) * (K-1)^(mod-2) % mod) % mod</span></span><br><span class="line">    <span class="comment"># (((N % mod * (K^T -1) % mod)) % mod * (K-1)^(mod-2) % mod) % mod</span></span><br><span class="line">    res = (((N % mod * (pow(k,t) % mod - <span class="number">1</span> + mod) % mod)) % mod * pow(k<span class="number">-1</span>, mod<span class="number">-2</span>) % mod) % mod</span><br><span class="line">    <span class="keyword">return</span> res</span><br><span class="line">print(solve(N,K,T))</span><br></pre></td></tr></table></figure></div></article></div></div><!--!--><!--!--></div></div></section><footer class="footer"><d
