</head><body class="is-1-column"><nav class="navbar navbar-main"><div class="container"><div class="navbar-brand justify-content-center"><a class="navbar-item navbar-logo" href="/">Daphne&#039;s blog</a></div><div class="navbar-menu"><div class="navbar-end"></div></div></div></nav><section class="section"><div class="container"><div class="columns"><div class="column order-2 column-main is-12"><div class="card"><div class="card-content"><nav class="breadcrumb" aria-label="breadcrumbs"><ul><li><a href="/tags">태그</a></li><li class="is-active"><a href="#" aria-current="page">2018 카카오 코딩테스트</a></li></ul></nav></div></div><div class="card"><article class="card-content article" role="article"><div class="article-meta is-size-7 is-uppercase level is-mobile"><div class="level-left"><span class="level-item"><time dateTime="2020-09-11T14:25:59.000Z" title="2020. 9. 11. 오후 11:25:59">2020-09-11</time>&nbsp;게시 됨</span><span class="level-item"><time dateTime="2020-09-11T14:35:01.975Z" title="2020. 9. 11. 오후 11:35:01">2020-09-11</time>&nbsp;업데이트 됨</span><span class="level-item"><a class="link-muted" href="/categories/%EC%95%8C%EA%B3%A0%EB%A6%AC%EC%A6%98-SQL/">알고리즘 &amp; SQL</a><span> / </span><a class="link-muted" href="/categories/%EC%95%8C%EA%B3%A0%EB%A6%AC%EC%A6%98-SQL/%ED%94%84%EB%A1%9C%EA%B7%B8%EB%9E%98%EB%A8%B8%EC%8A%A4/">프로그래머스</a></span></div></div><h1 class="title is-3 is-size-4-mobile"><a class="link-muted" href="/2020/09/11/algo-017/">[프로그래머스] Level 3 추석 트래픽</a></h1><div class="content"><p><img src="/image/algo_017.PNG" alt=""><br><img src="/image/algo_017-1.PNG" alt=""></p>
<p><strong>풀이</strong></p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br></pre></td><td class="code"><pre><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">solution</span><span class="params">(lines)</span>:</span></span><br><span class="line">    ans = <span class="number">0</span></span><br><span class="line">    <span class="comment"># 각 트래픽의 시작시간과 끝시간을 각각 저장할 배열 생성</span></span><br><span class="line">    start, end = [], []</span><br><span class="line">    <span class="keyword">for</span> line <span class="keyword">in</span> lines:</span><br><span class="line">        <span class="comment"># 단위를 초(s) 단위로 변경시켜 준다.</span></span><br><span class="line">        tmp = float(line[<span class="number">11</span>:<span class="number">13</span>]) * <span class="number">3600</span> + float(line[<span class="number">14</span>:<span class="number">16</span>]) * <span class="number">60</span> + float(line[<span class="number">17</span>:<span class="number">23</span>])</span><br><span class="line">        end.append(tmp)</span><br><span class="line">        <span class="comment"># 시작 시간 = 끝시간 - 처리시간 + 0.001 을 소수 3자리까지 저장</span></span><br><span class="line">        start.append(round(tmp - float(line[<span class="number">24</span>:<span class="number">-1</span>]) + <span class="number">0.001</span>,<span class="number">3</span>))</span><br><span class="line"></span><br><span class="line">    <span class="keyword">for</span> i <span class="keyword">in</span> range(len(lines)):</span><br><span class="line">        cnt = <span class="number">1</span></span><br><span class="line">        <span class="keyword">for</span> j <span class="keyword">in</span> range(i+<span class="number">1</span>, len(lines)):</span><br><span class="line">            <span class="comment"># 초당 처리량 = 끝시간 + 1초 &gt; 다른 트래픽의 시작 시간</span></span><br><span class="line">            <span class="comment"># 위의 조건에 해당되는 것이 1초 동안의 트래픽의 처리량이다.</span></span><br><span class="line">            <span class="keyword">if</span> end[i] + <span class="number">1</span> &gt; start[j]:</span><br><span class="line">                cnt += <span class="number">1</span></span><br><span class="line">        <span class="comment"># 그 중 최대 처리량을 저장</span></span><br><span class="line">        ans = max(cnt, ans)</span><br><span class="line">            </span><br><span class="line">    <span class="keyword">return</span> ans</span><br></pre></td></tr></table></figure>
