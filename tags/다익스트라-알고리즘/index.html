<p><strong>풀이</strong></p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> sys, heapq</span><br><span class="line"><span class="comment"># 노드의 개수 v, 간선의 개수 e</span></span><br><span class="line">v, e = map(int, sys.stdin.readline().split())</span><br><span class="line"><span class="comment"># 시작 노드 번호 k</span></span><br><span class="line">k = int(sys.stdin.readline())</span><br><span class="line"><span class="comment"># 노드 간의 거리는 10이하의 자연수이므로</span></span><br><span class="line"><span class="comment"># 노드 간의 최대 거리는 10 x v(노드 개수)이다.</span></span><br><span class="line"><span class="comment"># 이보다 +1 큰 수를 지정해 노드 간의 거리가 무한, 즉 이어지지 않았음을 표시</span></span><br><span class="line">INF = <span class="number">10</span> * v +<span class="number">1</span></span><br><span class="line"></span><br><span class="line"><span class="comment"># 방향 그래프 생성 </span></span><br><span class="line">graph = [[] <span class="keyword">for</span> _ <span class="keyword">in</span> range(v+<span class="number">1</span>)]</span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> range(e):</span><br><span class="line">    a, b, w = map(int, sys.stdin.readline().split())</span><br><span class="line">    graph[a].append((b,w))</span><br><span class="line"></span><br><span class="line"><span class="comment"># 노드 간의 거리를 무한으로 모두 초기화</span></span><br><span class="line">distance = [INF] * (v+<span class="number">1</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 다익스트라 알고리즘 </span></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">dijkstra</span><span class="params">(start)</span>:</span></span><br><span class="line">    q = []</span><br><span class="line">    <span class="comment"># 우선 순위 큐를 이용</span></span><br><span class="line">    heapq.heappush(q, (<span class="number">0</span>, start))</span><br><span class="line">    <span class="comment"># 시작 노드는 거리가 0으로 시작</span></span><br><span class="line">    distance[start] = <span class="number">0</span></span><br><span class="line">    </span><br><span class="line">    <span class="keyword">while</span> q:</span><br><span class="line">        dist, node = heapq.heappop(q)</span><br><span class="line">        <span class="comment"># 시작 노드부터 현재 선택된 노드로 가는 총 거리 dist보다</span></span><br><span class="line">        <span class="comment"># 이전에 계산된 거리가 더 짧다면 스킵 </span></span><br><span class="line">        <span class="keyword">if</span> distance[node] &lt; dist:</span><br><span class="line">            <span class="keyword">continue</span></span><br><span class="line">        <span class="keyword">for</span> i <span class="keyword">in</span> graph[node]:</span><br><span class="line">            <span class="comment"># 현재 선택된 노드와 연결된 다음 노드 : i[0]</span></span><br><span class="line">            <span class="comment"># 현재 선택된 노드와 연결된 다음 노드까지의 거리 : i[1]</span></span><br><span class="line">            cost = dist + i[<span class="number">1</span>]</span><br><span class="line">            <span class="comment"># 이전에 계산된 거리보다 cost가 작다면</span></span><br><span class="line">            <span class="comment"># 큐에 지금까지 더해진 최소 거리와 해당 노드를 저장</span></span><br><span class="line">            <span class="keyword">if</span> cost &lt; distance[i[<span class="number">0</span>]]:</span><br><span class="line">                distance[i[<span class="number">0</span>]] = cost</span><br><span class="line">                heapq.heappush(q, (cost, i[<span class="number">0</span>]))</span><br><span class="line"></span><br><span class="line"><span class="comment"># 시작 노드 k에서 각 노드까지의 거리를 구함</span></span><br><span class="line">dijkstra(k)</span><br><span class="line"></span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> range(<span class="number">1</span>, v+<span class="number">1</span>):</span><br><span class="line">    <span class="keyword">if</span> distance[i] == INF:</span><br><span class="line">        print(<span class="string">"INF"</span>)</span><br><span class="line">    <span class="keyword">else</span>:</span><br><span class="line">        print(distance[i])</span><br></pre></td></tr></table></figure>
