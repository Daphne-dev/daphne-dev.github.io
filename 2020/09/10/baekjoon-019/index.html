"line"></span><br><span class="line"><span class="comment"># DFS 탐색</span></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">dfs</span><span class="params">(x, y)</span>:</span></span><br><span class="line">    <span class="comment"># 범위를 벗어나면 즉시 종료   </span></span><br><span class="line">    <span class="keyword">if</span> x &lt;= <span class="number">-1</span> <span class="keyword">or</span> x &gt;= m <span class="keyword">or</span> y &lt;= <span class="number">-1</span> <span class="keyword">or</span> y &gt;= n:</span><br><span class="line">        <span class="keyword">return</span> <span class="literal">False</span></span><br><span class="line">    <span class="comment"># 현재 노드를 방문하지 않았을 경우 </span></span><br><span class="line">    <span class="keyword">if</span> graph[x][y] == <span class="number">1</span>:</span><br><span class="line">        <span class="comment"># 해당 노드를 방문처리</span></span><br><span class="line">        graph[x][y] = <span class="number">0</span></span><br><span class="line"></span><br><span class="line">        <span class="comment"># 상하좌우 방향으로 이동 후 탐색</span></span><br><span class="line">        dfs(x<span class="number">-1</span>, y)</span><br><span class="line">        dfs(x+<span class="number">1</span>, y)</span><br><span class="line">        dfs(x, y<span class="number">-1</span>)</span><br><span class="line">        dfs(x, y+<span class="number">1</span>)</span><br><span class="line">        <span class="keyword">return</span> <span class="literal">True</span></span><br><span class="line">    <span class="keyword">return</span> <span class="literal">False</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> range(t):</span><br><span class="line">    m, n, k = map(int, input().split())</span><br><span class="line"></span><br><span class="line">    graph = [[<span class="number">0</span> <span class="keyword">for</span> i <span class="keyword">in</span> range(n)] <span class="keyword">for</span> j <span class="keyword">in</span> range(m)]</span><br><span class="line"> </span><br><span class="line">    <span class="keyword">for</span> i <span class="keyword">in</span> range(k):</span><br><span class="line">        a, b = map(int, input().split())</span><br><span class="line">        graph[a][b] = <span class="number">1</span></span><br><span class="line">        </span><br><span class="line">    ans = <span class="number">0</span></span><br><span class="line">    </span><br><span class="line">    <span class="comment"># 모든 노드에 대하여 배추가 인접한 경우를 탐색</span></span><br><span class="line">    <span class="keyword">for</span> i <span class="keyword">in</span> range(m):</span><br><span class="line">        <span class="keyword">for</span> j <span class="keyword">in</span> range(n):</span><br><span class="line">            <span class="comment"># 해당 위치에서 DFS 수행</span></span><br><span class="line">            <span class="comment"># 하나의 그룹이 모두 탐색되었다면 True가 반환된다.</span></span><br><span class="line">            <span class="keyword">if</span> dfs(i,j) == <span class="literal">True</span>:</span><br><span class="line">                ans += <span class="number">1</span></span><br><span class="line">    print(ans)</span><br></pre></td></tr></table></figure>
