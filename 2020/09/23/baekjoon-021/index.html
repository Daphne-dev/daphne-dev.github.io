<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br></pre></td><td class="code"><pre><span class="line">n, m, x, y, k = map(int, input().split())</span><br><span class="line"></span><br><span class="line"><span class="comment"># 주사위에 적힌 숫자 저장</span></span><br><span class="line">dice_num = [<span class="number">0</span>] * <span class="number">6</span></span><br><span class="line"></span><br><span class="line"><span class="comment"># 지도</span></span><br><span class="line">board = []</span><br><span class="line"><span class="keyword">for</span> _ <span class="keyword">in</span> range(n):</span><br><span class="line">    board.append(list(map(int, input().split())))</span><br><span class="line"></span><br><span class="line"><span class="comment"># 이동하는 명령 저장</span></span><br><span class="line">moves = list(map(int, input().split()))</span><br><span class="line"></span><br><span class="line"><span class="comment"># 동 서 북 남</span></span><br><span class="line">dx = [<span class="number">0</span>, <span class="number">0</span>, <span class="number">-1</span>, <span class="number">1</span>]</span><br><span class="line">dy = [<span class="number">1</span>, <span class="number">-1</span>, <span class="number">0</span>, <span class="number">0</span>]</span><br><span class="line"></span><br><span class="line"><span class="comment"># 이동할 때마다 저장된 번호의 위치 변경</span></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">moving</span><span class="params">(direction)</span>:</span></span><br><span class="line">    <span class="comment"># 동</span></span><br><span class="line">    <span class="keyword">if</span> direction == <span class="number">0</span>:</span><br><span class="line">        dice_num[<span class="number">0</span>], dice_num[<span class="number">2</span>], dice_num[<span class="number">3</span>], dice_num[<span class="number">5</span>] = dice_num[<span class="number">2</span>], dice_num[<span class="number">5</span>], dice_num[<span class="number">0</span>], dice_num[<span class="number">3</span>]</span><br><span class="line">    <span class="comment"># 서</span></span><br><span class="line">    <span class="keyword">elif</span> direction == <span class="number">1</span>:</span><br><span class="line">        dice_num[<span class="number">0</span>], dice_num[<span class="number">2</span>], dice_num[<span class="number">3</span>], dice_num[<span class="number">5</span>] = dice_num[<span class="number">3</span>], dice_num[<span class="number">0</span>], dice_num[<span class="number">5</span>], dice_num[<span class="number">2</span>]</span><br><span class="line">    <span class="comment"># 북</span></span><br><span class="line">    <span class="keyword">elif</span> direction == <span class="number">2</span>:</span><br><span class="line">        dice_num[<span class="number">0</span>], dice_num[<span class="number">1</span>], dice_num[<span class="number">4</span>], dice_num[<span class="number">5</span>] = dice_num[<span class="number">1</span>], dice_num[<span class="number">5</span>], dice_num[<span class="number">0</span>], dice_num[<span class="number">4</span>]</span><br><span class="line">    <span class="comment"># 남</span></span><br><span class="line">    <span class="keyword">elif</span> direction == <span class="number">3</span>:</span><br><span class="line">        dice_num[<span class="number">0</span>], dice_num[<span class="number">1</span>], dice_num[<span class="number">4</span>], dice_num[<span class="number">5</span>] = dice_num[<span class="number">4</span>], dice_num[<span class="number">0</span>], dice_num[<span class="number">5</span>], dice_num[<span class="number">1</span>]</span><br><span class="line"></span><br><span class="line"><span class="keyword">for</span> move <span class="keyword">in</span> moves:</span><br><span class="line">    move -= <span class="number">1</span></span><br><span class="line">    nx = x + dx[move]</span><br><span class="line">    ny = y + dy[move]</span><br><span class="line">    <span class="comment"># 지도 범위를 벗어나면 해당 명령 무시</span></span><br><span class="line">    <span class="keyword">if</span> nx &gt;= n <span class="keyword">or</span> <span class="number">0</span> &gt; nx  <span class="keyword">or</span> <span class="number">0</span> &gt; ny <span class="keyword">or</span> ny &gt;= m:</span><br><span class="line">        <span class="keyword">continue</span></span><br><span class="line"></span><br><span class="line">    <span class="comment"># 주사위를 이동한 좌표</span></span><br><span class="line">    x, y = nx, ny</span><br><span class="line"></span><br><span class="line">    <span class="comment"># 주사위 굴리기</span></span><br><span class="line">    moving(move)</span><br><span class="line"></span><br><span class="line">    <span class="comment"># 만약 이동한 칸의 쓰여있는 숫자가 0이면 </span></span><br><span class="line">    <span class="keyword">if</span> board[x][y] == <span class="number">0</span>:</span><br><span class="line">        <span class="comment"># 주사위의 바닥면에 쓰인 수가 칸에 복사</span></span><br><span class="line">        board[x][y] = dice_num[<span class="number">0</span>]</span><br><span class="line">    <span class="keyword">else</span>:</span><br><span class="line">        <span class="comment"># 아닐 경우 칸에 쓰여있는 숫자가 주사위 바닥면으로 복사</span></span><br><span class="line">        dice_num[<span class="number">0</span>] = board[x][y]</span><br><span class="line">        <span class="comment"># 칸에 쓰여 있는 수 0으로 변경</span></span><br><span class="line">        board[x][y] = <span class="number">0</span></span><br><span class="line">    <span class="comment"># 항상 주사위의 윗 면에 쓰여있는 수 출력</span></span><br><span class="line">    <span class="comment"># 주사위 윗 면 : dice_num[5]</span></span><br><span class="line">    <span class="comment"># 주사위 아랫 면 : dice_num[0]</span></span><br><span class="line">    print(dice_num[<span class="number">5</span>])</span><br></pre></td></tr></table></figure>
