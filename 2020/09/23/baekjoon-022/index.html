class="comment"># t[i][0] = 톱니바퀴 12시방향, t[i][2] 톱니바퀴 3시 방향, t[i][6] 톱니바퀴 9시 방향</span></span><br><span class="line">t = [deque(map(int,input())) <span class="keyword">for</span> _ <span class="keyword">in</span> range(<span class="number">4</span>)]</span><br><span class="line"></span><br><span class="line"><span class="comment"># deque의 rotate(x) 함수는 x가 양수면 오른쪽으로 수 만큼 회전하고 음수면 반대로 회전한다.</span></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">turn_t</span><span class="params">(t_num, d)</span>:</span></span><br><span class="line">    <span class="comment"># 톱니바퀴 시작 번호</span></span><br><span class="line">    t_num -= <span class="number">1</span></span><br><span class="line">    <span class="comment"># 현재 기준 톱니바퀴 값 저장 </span></span><br><span class="line">    tmp_2 = t[t_num][<span class="number">2</span>] </span><br><span class="line">    tmp_6 = t[t_num][<span class="number">6</span>]</span><br><span class="line">    <span class="comment"># 현재 톱니바퀴 회전</span></span><br><span class="line">    t[t_num].rotate(d)</span><br><span class="line"></span><br><span class="line">    <span class="comment"># 기준 회전 방향 저장</span></span><br><span class="line">    tmp_d = d</span><br><span class="line"></span><br><span class="line">    <span class="comment"># 톱니 기준 왼쪽</span></span><br><span class="line">    d = tmp_d</span><br><span class="line">    <span class="keyword">for</span> i <span class="keyword">in</span> range(t_num<span class="number">-1</span>, <span class="number">-1</span>, <span class="number">-1</span>):</span><br><span class="line">        <span class="keyword">if</span> t[i][<span class="number">2</span>] != tmp_6:</span><br><span class="line">            tmp_6 = t[i][<span class="number">6</span>]</span><br><span class="line">            t[i].rotate(d*<span class="number">-1</span>) </span><br><span class="line">            d *= <span class="number">-1</span></span><br><span class="line">        <span class="keyword">else</span>:</span><br><span class="line">            <span class="keyword">break</span></span><br><span class="line"></span><br><span class="line">    <span class="comment"># 톱니 기준 오른쪽</span></span><br><span class="line">    d = tmp_d</span><br><span class="line">    <span class="keyword">for</span> i <span class="keyword">in</span> range(t_num+<span class="number">1</span>, <span class="number">4</span>):</span><br><span class="line">        <span class="keyword">if</span> t[i][<span class="number">6</span>] != tmp_2:</span><br><span class="line">            tmp_2 = t[i][<span class="number">2</span>]</span><br><span class="line">            t[i].rotate(d*<span class="number">-1</span>) </span><br><span class="line">            d *= <span class="number">-1</span></span><br><span class="line">        <span class="keyword">else</span>:</span><br><span class="line">            <span class="keyword">break</span>    </span><br><span class="line"></span><br><span class="line">k = int(input())</span><br><span class="line"><span class="keyword">for</span> _ <span class="keyword">in</span> range(k):</span><br><span class="line">    <span class="comment"># 톱니바퀴 번호, 회전 방향</span></span><br><span class="line">    t_num, dircetion = map(int, input().split())</span><br><span class="line">    turn_t(t_num, dircetion)</span><br><span class="line"></span><br><span class="line">res = <span class="number">0</span></span><br><span class="line"></span><br><span class="line"><span class="comment"># 점수 게산</span></span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> range(<span class="number">4</span>):</span><br><span class="line">    <span class="keyword">if</span> t[i][<span class="number">0</span>] == <span class="number">1</span>:</span><br><span class="line">        res += <span class="number">2</span> ** i</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">print(res)</span><br></pre></td></tr></table></figure>
