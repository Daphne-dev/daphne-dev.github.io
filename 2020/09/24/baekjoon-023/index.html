<p><strong>풀이</strong></p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">from</span> itertools <span class="keyword">import</span> permutations</span><br><span class="line"><span class="keyword">import</span> sys</span><br><span class="line"></span><br><span class="line">n = int(sys.stdin.readline())</span><br><span class="line">a = list(map(int, sys.stdin.readline().split()))</span><br><span class="line">calculate = list(map(int, sys.stdin.readline().split()))</span><br><span class="line"></span><br><span class="line">operator = [<span class="string">'+'</span>, <span class="string">'-'</span>, <span class="string">'*'</span>, <span class="string">'/'</span>]</span><br><span class="line"></span><br><span class="line"><span class="comment"># 모든 연산자를 저장</span></span><br><span class="line">tmp_c = []</span><br><span class="line"></span><br><span class="line"><span class="comment"># 입력받은 연산자의 개수대로 tmp_c에 저장</span></span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> range(<span class="number">4</span>):</span><br><span class="line">    <span class="keyword">for</span> j <span class="keyword">in</span> range(calculate[i]):</span><br><span class="line">        tmp_c.append(operator[i])</span><br><span class="line"></span><br><span class="line"><span class="comment"># 연산자에 따라 계산</span></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">calculation</span><span class="params">(o, num, res)</span>:</span></span><br><span class="line">    <span class="keyword">if</span> o == <span class="string">'+'</span>:</span><br><span class="line">        res += num</span><br><span class="line">    <span class="keyword">if</span> o == <span class="string">'-'</span>:</span><br><span class="line">        res -= num</span><br><span class="line">    <span class="keyword">if</span> o == <span class="string">'*'</span>:</span><br><span class="line">        res *= num</span><br><span class="line">    <span class="keyword">if</span> o == <span class="string">'/'</span>:</span><br><span class="line">        <span class="keyword">if</span> res &lt; <span class="number">0</span>:</span><br><span class="line">            res *= <span class="number">-1</span></span><br><span class="line">            res = res // num</span><br><span class="line">            res *= <span class="number">-1</span></span><br><span class="line">        <span class="keyword">else</span>:</span><br><span class="line">            res = res // num</span><br><span class="line">    <span class="keyword">return</span> res</span><br><span class="line"></span><br><span class="line"><span class="comment"># 최대 값 저장 </span></span><br><span class="line">max_num = -sys.maxsize <span class="number">-1</span></span><br><span class="line"><span class="comment"># 최소 값 저장</span></span><br><span class="line">min_num = sys.maxsize</span><br><span class="line"><span class="comment"># 연산자의 모든 경우의 수를 구한 후 중복 제거</span></span><br><span class="line"><span class="comment"># permutations(list, x)는 list에서 x개를 꺼내는 모든 경우의 수를 구하는 함수이다.</span></span><br><span class="line">c_list = set(permutations(tmp_c, n<span class="number">-1</span>))</span><br><span class="line"></span><br><span class="line"><span class="comment"># 모든 연산의 경우의 수 완전 탐색</span></span><br><span class="line"><span class="keyword">for</span> c <span class="keyword">in</span> c_list:</span><br><span class="line">    <span class="comment"># 처음 시작은 항상 a의 첫 번째 값</span></span><br><span class="line">    res = a[<span class="number">0</span>]</span><br><span class="line">    <span class="keyword">for</span> i <span class="keyword">in</span> range(len(c)):</span><br><span class="line">        res = calculation(c[i], a[i+<span class="number">1</span>], res)</span><br><span class="line">    <span class="comment"># 이전 값 보다 크면 해당 값을 저장</span></span><br><span class="line">    max_num = max(res, max_num)</span><br><span class="line">    <span class="comment"># 이전 값 보다 작으면 해당 값을 저장</span></span><br><span class="line">    min_num = min(res, min_num)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 최대 값, 최소 값 출력</span></span><br><span class="line">print(max_num)</span><br><span class="line">print(min_num)</span><br></pre></td></tr></table></figure>
