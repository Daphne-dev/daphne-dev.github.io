<p><strong>풀이</strong></p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br></pre></td><td class="code"><pre><span class="line">n = int(input())</span><br><span class="line"></span><br><span class="line"><span class="comment"># 1일부터 이므로 각각 0번째 미리 추가해둠</span></span><br><span class="line"><span class="comment"># 상담일 수 저장</span></span><br><span class="line">day = [<span class="number">0</span>] </span><br><span class="line"><span class="comment"># 상담 시 받을 수 있는 금액 저장</span></span><br><span class="line">pay = [<span class="number">0</span>]</span><br><span class="line"></span><br><span class="line"><span class="keyword">for</span> _ <span class="keyword">in</span> range(n):</span><br><span class="line">    t, p = map(int, input().split())</span><br><span class="line">    day.append(t)</span><br><span class="line">    pay.append(p)</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">dfs</span><span class="params">(d, cost)</span>:</span></span><br><span class="line">    <span class="keyword">global</span> ans</span><br><span class="line">    <span class="comment"># 상담의 최대 이익 저장</span></span><br><span class="line">    <span class="keyword">if</span> d == n + <span class="number">1</span>:</span><br><span class="line">        ans = max(ans, cost)</span><br><span class="line">        <span class="keyword">return</span> </span><br><span class="line">    <span class="keyword">if</span> d + day[d] &lt;= n + <span class="number">1</span>:</span><br><span class="line">        dfs(d + day[d], cost + pay[d])</span><br><span class="line">    <span class="keyword">if</span> d + <span class="number">1</span> &lt;= n + <span class="number">1</span>:</span><br><span class="line">        dfs(d + <span class="number">1</span>, cost)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 최대 수익</span></span><br><span class="line">ans = <span class="number">0</span></span><br><span class="line"></span><br><span class="line">dfs(<span class="number">1</span>, <span class="number">0</span>)</span><br><span class="line"></span><br><span class="line">print(ans)</span><br></pre></td></tr></table></figure>
