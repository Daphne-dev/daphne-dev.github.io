<p><strong>풀이</strong></p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">from</span> collections <span class="keyword">import</span> deque</span><br><span class="line"><span class="keyword">import</span> sys</span><br><span class="line">n, k = map(int, sys.stdin.readline().split())</span><br><span class="line"></span><br><span class="line">graph = []</span><br><span class="line"></span><br><span class="line"><span class="comment"># 바이러스의 번호, 시간, 바이러스의 위치를 저장</span></span><br><span class="line">data = []</span><br><span class="line"></span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> range(n):</span><br><span class="line">    graph.append(list(map(int, sys.stdin.readline().split())))</span><br><span class="line">    <span class="keyword">for</span> j <span class="keyword">in</span> range(n):</span><br><span class="line">        <span class="keyword">if</span> graph[i][j] != <span class="number">0</span>:</span><br><span class="line">                data.append((graph[i][j], <span class="number">0</span>, i, j))</span><br><span class="line"></span><br><span class="line">target_s, target_x, target_y = map(int, sys.stdin.readline().split())</span><br><span class="line"></span><br><span class="line">dx = [<span class="number">0</span>, <span class="number">0</span>, <span class="number">1</span>, <span class="number">-1</span>]</span><br><span class="line">dy = [<span class="number">1</span>, <span class="number">-1</span>, <span class="number">0</span>, <span class="number">0</span>]</span><br><span class="line"></span><br><span class="line"><span class="comment"># 가장 낮은 번호의 바이러스부터 퍼지므로 오름차순 정렬</span></span><br><span class="line">data.sort()</span><br><span class="line"></span><br><span class="line">q = deque(data)</span><br><span class="line"></span><br><span class="line"><span class="keyword">while</span> q:</span><br><span class="line">    v, s, x, y = q.popleft()</span><br><span class="line">    </span><br><span class="line">    <span class="keyword">if</span> target_s == s:</span><br><span class="line">        <span class="keyword">break</span></span><br><span class="line">    <span class="keyword">for</span> i <span class="keyword">in</span> range(<span class="number">4</span>):</span><br><span class="line">        nx = x + dx[i]</span><br><span class="line">        ny = y + dy[i]</span><br><span class="line">        <span class="keyword">if</span> <span class="number">0</span> &lt;= nx &lt; n <span class="keyword">and</span> <span class="number">0</span> &lt;= ny &lt; n:</span><br><span class="line">            <span class="keyword">if</span> graph[nx][ny] == <span class="number">0</span>:</span><br><span class="line">                graph[nx][ny] = v</span><br><span class="line">                q.append((graph[nx][ny], s+<span class="number">1</span>, nx, ny))</span><br><span class="line"></span><br><span class="line">print(graph[target_x<span class="number">-1</span>][target_y<span class="number">-1</span>])</span><br></pre></td></tr></table></figure>
