<p><strong>풀이</strong></p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment"># 공유기 설치</span></span><br><span class="line"><span class="keyword">import</span> sys</span><br><span class="line"></span><br><span class="line">input = sys.stdin.readline</span><br><span class="line">n, c = map(int, input().split())</span><br><span class="line">x = []</span><br><span class="line"></span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> range(n):</span><br><span class="line">    x.append(int(input().rstrip()))</span><br><span class="line"></span><br><span class="line"><span class="comment"># 이분 탐색을 하기 위해 데이터를 정렬한다.</span></span><br><span class="line">x.sort()</span><br><span class="line"></span><br><span class="line"><span class="comment"># 집의 최소 위치는 1이기 때문에 1을 준다</span></span><br><span class="line">start = <span class="number">1</span></span><br><span class="line"><span class="comment"># 공유기 사이의 최대 거리는 제일 먼 거리에 있는 집 보다 클 수 없다.</span></span><br><span class="line">end = x[<span class="number">-1</span>]</span><br><span class="line"></span><br><span class="line">result = <span class="number">0</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">while</span> start &lt;= end:</span><br><span class="line">    mid = (start + end) // <span class="number">2</span></span><br><span class="line">    tmp = x[<span class="number">0</span>]</span><br><span class="line">    count_c = <span class="number">1</span></span><br><span class="line">    <span class="keyword">for</span> i <span class="keyword">in</span> x:</span><br><span class="line">        <span class="comment"># 현재 위치의 집 - 이전 위치의 집이 mid보다 크거나 같으면 </span></span><br><span class="line">        <span class="keyword">if</span> i - tmp &gt;= mid:</span><br><span class="line">            <span class="comment"># 카운트 하고 </span></span><br><span class="line">            count_c += <span class="number">1</span></span><br><span class="line">            <span class="comment"># tmp를 현재 위치로 변경</span></span><br><span class="line">            tmp = i</span><br><span class="line">    <span class="comment"># 카운트한 공유기 개수가 목표 공유기 개수보다 작으면</span></span><br><span class="line">    <span class="comment"># 목표한 공유기 사이의 거리를 줄임 </span></span><br><span class="line">    <span class="keyword">if</span> c &gt; count_c:</span><br><span class="line">        end = mid - <span class="number">1</span></span><br><span class="line">    <span class="comment"># 목표한 공유기 사이의 거리를 늘리고</span></span><br><span class="line">    <span class="comment"># 해당 거리를 저장</span></span><br><span class="line">    <span class="keyword">else</span>:</span><br><span class="line">        start = mid + <span class="number">1</span></span><br><span class="line">        result = mid</span><br><span class="line">print(result)</span><br></pre></td></tr></table></figure>
