<p><strong>풀이</strong></p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">from</span> itertools <span class="keyword">import</span> combinations</span><br><span class="line"></span><br><span class="line">n, m = map(int,input().split())</span><br><span class="line">cards = list(map(str, input().split()))</span><br><span class="line"></span><br><span class="line">ans = <span class="number">0</span></span><br><span class="line"><span class="comment"># 3장이 모이는 모든 카드의 조합을 구함 </span></span><br><span class="line"><span class="keyword">for</span> card <span class="keyword">in</span> combinations(cards, <span class="number">3</span>):</span><br><span class="line">    card_sum = sum(list(map(int, card)))</span><br><span class="line">    <span class="comment"># 3장을 더한 값이 m을 넘지 않을 경우 중 최대 값 저장</span></span><br><span class="line">    <span class="keyword">if</span> card_sum &lt;= m:</span><br><span class="line">        ans = max(ans, card_sum)</span><br><span class="line">print(ans)</span><br></pre></td></tr></table></figure>
