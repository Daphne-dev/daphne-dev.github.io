<p><strong>풀이</strong></p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">from</span> collections <span class="keyword">import</span> deque</span><br><span class="line">computer = int(input())</span><br><span class="line">computer_edge = int(input())</span><br><span class="line"></span><br><span class="line"><span class="comment"># 그래프 생성 </span></span><br><span class="line">graph = dict()</span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> range(computer_edge):</span><br><span class="line">    a, b = map(int,input().split())</span><br><span class="line">    <span class="keyword">if</span> a <span class="keyword">in</span> graph:</span><br><span class="line">        graph[a].append(b)</span><br><span class="line">    <span class="keyword">else</span>: </span><br><span class="line">        graph[a] = [b]</span><br><span class="line">    <span class="keyword">if</span> b <span class="keyword">in</span> graph:</span><br><span class="line">        graph[b].append(a)</span><br><span class="line">    <span class="keyword">else</span>:</span><br><span class="line">        graph[b] = [a]</span><br><span class="line"></span><br><span class="line"><span class="comment"># BFS를 통해 1번 컴퓨터와 연결된 모든 노드 조사 </span></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">bfs</span><span class="params">(graph, n)</span>:</span></span><br><span class="line">    <span class="comment"># 1번 컴퓨터와 연결되어 있다면 visited에 저장됨 </span></span><br><span class="line">    visited = []</span><br><span class="line">    q = deque()</span><br><span class="line">    q.append(n)</span><br><span class="line">    </span><br><span class="line">    <span class="keyword">while</span> q:</span><br><span class="line">        node = q.popleft()</span><br><span class="line">        <span class="keyword">if</span> node <span class="keyword">not</span> <span class="keyword">in</span> visited:</span><br><span class="line">            visited.append(node)</span><br><span class="line">            q.extend(graph[node])</span><br><span class="line">        <span class="comment"># 자기 자신인 1번 컴퓨터를 뺀 나머지 컴퓨터 수</span></span><br><span class="line">    <span class="keyword">return</span> len(visited) - <span class="number">1</span></span><br><span class="line"></span><br><span class="line">print(bfs(graph, <span class="number">1</span>))</span><br></pre></td></tr></table></figure>
