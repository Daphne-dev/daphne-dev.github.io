<p><strong>풀이</strong></p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> sys</span><br><span class="line"><span class="keyword">from</span> collections <span class="keyword">import</span> Counter</span><br><span class="line"></span><br><span class="line">input = sys.stdin.readline</span><br><span class="line"></span><br><span class="line">n = int(input())</span><br><span class="line"></span><br><span class="line">array = []</span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> range(n):</span><br><span class="line">    array.append(int(input()))</span><br><span class="line"></span><br><span class="line">array.sort()</span><br><span class="line"></span><br><span class="line">cnt = Counter(array)</span><br><span class="line"><span class="comment"># 최빈값 구하기</span></span><br><span class="line">cnt = cnt.most_common()</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="keyword">if</span> len(cnt) != <span class="number">1</span>:</span><br><span class="line">  <span class="comment"># 최빈값에 해당하는 숫자가 2개면 두번째 값을 최빈값으로 지정</span></span><br><span class="line">  <span class="keyword">if</span> cnt[<span class="number">0</span>][<span class="number">1</span>] == cnt[<span class="number">1</span>][<span class="number">1</span>]:</span><br><span class="line">    cnt = cnt[<span class="number">1</span>][<span class="number">0</span>]</span><br><span class="line">  <span class="keyword">else</span>:</span><br><span class="line">    cnt = cnt[<span class="number">0</span>][<span class="number">0</span>]</span><br><span class="line"><span class="comment"># 주어진 숫자가 1개만 있을 경우 해당 값을 최빈값으로 지정</span></span><br><span class="line"><span class="keyword">else</span>:</span><br><span class="line">  cnt = cnt[<span class="number">0</span>][<span class="number">0</span>]</span><br><span class="line"></span><br><span class="line">print(round(sum(array) / n))</span><br><span class="line"><span class="comment"># 주어진 숫자의 개수가 홀수라면 중앙 값을 출력, 짝수라면 두개의 평균 값을 출력 </span></span><br><span class="line">print(array[n // <span class="number">2</span>] <span class="keyword">if</span> n %<span class="number">2</span> != <span class="number">0</span> <span class="keyword">else</span> round((array[n // <span class="number">2</span>] + array[n //<span class="number">2</span>+<span class="number">1</span>])/<span class="number">2</span>))</span><br><span class="line">print(cnt)</span><br><span class="line">print(array[<span class="number">-1</span>] - array[<span class="number">0</span>])</span><br></pre></td></tr></table></figure>
